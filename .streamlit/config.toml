[server]
# 关闭文件监听和静态文件服务加速
runOnSave = false
enableStaticServing = false
# 无头模式
headless = true
# 前后端最大消息大小
maxMessageSize = 200

[runner]
# 快速重跑（复用解释器，避免重新编译）
fastReruns = true
# 脚本启动超时
magicEnabled = false

[browser]
# 关闭使用统计
gatherUsageStats = false
# 启动时不自动打开浏览器（run.bat 已经用 start 打开）
serverAddress = "localhost"

[client]
# 工具栏位置
toolbarMode = "minimal"
# 禁用 XSRF 保护加速本地开发
showErrorDetails = true

[theme]
base = "dark"
primaryColor = "#FF6B35"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e6edf3"
font = "sans serif"
